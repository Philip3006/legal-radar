name: radar
on:
  schedule:
    - cron: "0 5 * * 1"   # wöchentlich, Montag. Gesetzgebung bewegt sich in Wochen.
  workflow_dispatch:
    inputs:
      send_mail:
        description: "Digest-Mail an alle Empfaenger schicken"
        type: boolean
        default: false

permissions:
  contents: write   # nötig für Dashboard-Commit auf main
  issues: read      # nötig für Watchlist-Lesen

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --frozen

      - run: uv run ruff check .
      - run: uv run pytest -q

      # SQLite-DB zwischen Runs cachen, sonst geht die History verloren.
      - name: DB-Cache laden
        uses: actions/cache@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}
          restore-keys: |
            radar-db-

      - name: Config aus Secrets bauen
        env:
          DIGEST_ABSENDER: ${{ secrets.DIGEST_ABSENDER }}
          DIGEST_EMPFAENGER: ${{ secrets.DIGEST_EMPFAENGER }}
        run: |
          python - <<'PY'
          import os, yaml
          empf = [e.strip() for e in os.environ["DIGEST_EMPFAENGER"].split(",") if e.strip()]
          cfg = {
            "prefilter_min_aufwand_eur": 10_000_000,
            "digest_absender": os.environ["DIGEST_ABSENDER"],
            "digest_empfaenger": empf,
          }
          with open("data/config.yaml", "w", encoding="utf-8") as f:
            yaml.safe_dump(cfg, f, sort_keys=False, allow_unicode=True)
          PY

      - name: Pipeline
        env:
          DIP_API_KEY: ${{ secrets.DIP_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_URL: ${{ secrets.SMTP_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RADAR_REPO: ${{ github.repository }}
        run: |
          uv run radar init
          uv run radar fetch --source dip --since 2024-01-01
          uv run radar score
          uv run radar digest --since 7d ${{ inputs.send_mail && '--send-mail' || '' }}
          uv run radar render-dashboard

      - name: Dashboard deployen
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "Kein Dashboard-Update."
          else
            git commit -m "chore: dashboard update $(date -u +%F)"
            git push
          fi
