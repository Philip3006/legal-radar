name: radar
on:
  schedule:
    - cron: "0 5 * * 1"   # wöchentlich, Montag. Gesetzgebung bewegt sich in Wochen.
  workflow_dispatch:
    inputs:
      send_mail:
        description: "Digest-Mail an alle Empfaenger schicken"
        type: boolean
        default: false

permissions:
  contents: write   # nötig für Dashboard-Commit auf main
  issues: read      # nötig für Watchlist-Lesen

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --frozen

      - run: uv run ruff check .
      - run: uv run pytest -q

      # DB liegt im Orphan-Branch 'data'. Cache waere fluechtig,
      # nach 7 Tagen ohne Zugriff geloescht - History darf nicht verloren gehen.
      - name: DB aus data-Branch laden
        run: |
          mkdir -p data
          git fetch origin data --depth 1 || { echo "Noch kein data-Branch - erster Run."; exit 0; }
          git show origin/data:radar.db > data/radar.db 2>/dev/null || echo "Keine DB im data-Branch (yet)."
          git show origin/data:rejected.jsonl > data/rejected.jsonl 2>/dev/null || true

      - name: Config aus Secrets bauen
        env:
          DIGEST_ABSENDER: ${{ secrets.DIGEST_ABSENDER }}
          DIGEST_EMPFAENGER: ${{ secrets.DIGEST_EMPFAENGER }}
        run: |
          python - <<'PY'
          import os, yaml
          empf = [e.strip() for e in os.environ["DIGEST_EMPFAENGER"].split(",") if e.strip()]
          cfg = {
            "prefilter_min_aufwand_eur": 10_000_000,
            "digest_absender": os.environ["DIGEST_ABSENDER"],
            "digest_empfaenger": empf,
          }
          with open("data/config.yaml", "w", encoding="utf-8") as f:
            yaml.safe_dump(cfg, f, sort_keys=False, allow_unicode=True)
          PY

      - name: Pipeline
        env:
          DIP_API_KEY: ${{ secrets.DIP_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_URL: ${{ secrets.SMTP_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RADAR_REPO: ${{ github.repository }}
          WATCH_ENDPOINT: ${{ secrets.WATCH_ENDPOINT }}
          WATCH_TOKEN: ${{ secrets.WATCH_TOKEN }}
        run: |
          uv run radar init
          uv run radar fetch --source dip --since 2024-01-01
          uv run radar score
          uv run radar digest --since 7d ${{ inputs.send_mail && '--send-mail' || '' }}
          uv run radar render-dashboard

      - name: Dashboard deployen
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "Kein Dashboard-Update."
          else
            git commit -m "chore: dashboard update $(date -u +%F)"
            git push
          fi

      - name: DB nach data-Branch pushen
        if: always()
        run: |
          test -f data/radar.db || { echo "Keine DB nach Pipeline."; exit 0; }
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          TMP=$(mktemp -d)
          cp data/radar.db "$TMP/radar.db"
          [ -f data/rejected.jsonl ] && cp data/rejected.jsonl "$TMP/rejected.jsonl" || true

          if git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
            git fetch origin data --depth 1
            git worktree add data-branch origin/data
            cd data-branch
            git switch -C data
          else
            git worktree add --detach data-branch
            cd data-branch
            git checkout --orphan data
            git rm -rf . >/dev/null 2>&1 || true
          fi

          cp "$TMP/radar.db" ./radar.db
          [ -f "$TMP/rejected.jsonl" ] && cp "$TMP/rejected.jsonl" ./rejected.jsonl || true
          printf 'Radar-DB Snapshots. Nicht editieren, wird vom Cron ueberschrieben.\n' > README.md
          git add -A
          if git diff --cached --quiet; then
            echo "Keine DB-Aenderung."
          else
            git commit -m "data: radar.db snapshot $(date -u +%F)"
            git push origin data
          fi
